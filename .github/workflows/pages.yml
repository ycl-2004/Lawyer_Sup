name: Deploy to GitHub Pages

# 静态部署前端（演示模式）。后端为 Python/FastAPI，Pages 无法运行，
# 故仅演示案件 + 客户端「不许猜」红线可用；实时上传/持久化需本地后端。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署；新 push 取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build (子路径 base = /Lawyer_Sup/)
        run: npm run build
        env:
          VITE_BASE: /Lawyer_Sup/
      - name: SPA 深链兜底（Pages 对未知路径返回 404.html）
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
